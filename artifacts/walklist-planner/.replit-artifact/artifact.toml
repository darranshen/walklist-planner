kind = "web"
previewPath = "/"
title = "WalkList Planner"
version = "1.0.0"
id = "artifacts/walklist-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25243

[services.development]
run = "pnpm --filter @workspace/walklist-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/walklist-planner", "run", "build" ]
publicDir = "artifacts/walklist-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25243"
BASE_PATH = "/"
